---
# defaults file 

# The role expects to get some variables from vault and passed in vars.
# They are used in the kickstart template.

hostname: kshost

# # public network
# public_net_short_name: public
# public_libvirt_name: "net{{ public_net_short_name }}"
# public_nmcli_name: "bridge-{{ public_net_short_name }}"
# public_bridge_name: "br{{ public_net_short_name }}"
# public_mac_prefix: "52:54:00:00"

# # home network
# home_network: "192.168.1.0/24"
# home_domain: home

# lab network
lab_net_short_name: lab
lab_net_prefix: "192.168.134"
lab_mac_prefix: "52:54:00:02"
#
lab_libvirt_name:   "net{{ lab_net_short_name }}"
lab_nmcli_name: "bridge-{{ lab_net_short_name }}"
lab_bridge_name:     "br{{ lab_net_short_name }}"
lab_bridge_mac:        "{{ lab_mac_prefix }}:00:01"
lab_bridge_ip_cidr:    "{{ lab_net_prefix }}.1/24"
lab_domain: silvan.uk

# service
# send mail here
relayhost: "message.{{ lab_domain }}"


# values for virt-install command
#---------
kickstart_install_config:
  fqdn: "{{ hostname }}.{{ lab_domain }}"
  cpus: 2
  ram: 4096                           # size in MiB (4G * 1024 = 4096M)
  disk_size: 30                       # size in GiB
  nics:
    name: enp1s0
    mac: "{{ lab_mac_prefix }}:00:99"
    ip: "{{ lab_net_prefix }}.99"     # IP is static
    net: "{{ lab_libvirt_name }}"
    gw: "{{ lab_net_prefix }}.1"
  install_iso: /var/lib/libvirt/images/rhel-10.1-x86_64-dvd.iso
  # Use this command to get the list of accepted OS variants.
  #  virt-install --osinfo list
  os_variant: rhel10.1
  # kickstart
  # playbook copies kvm-guest.ks to /var/tmp/
  # !!! replace /var/tmp with a temporary ansible working directory
  kickstart_file_path: "/var/tmp"
  kickstart_file_template: "kvm-guest-nic-static.ks.j2"
  kickstart_file_name: "{{ fqdn }}.ks"
#---------
